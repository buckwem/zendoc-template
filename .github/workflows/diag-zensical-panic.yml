name: Diag Zensical Panic
on:
  push:
    branches:
      - verify-workaround
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
      PANDOC_VERSION: "3.10"
      GITHUB_PAGES: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: sudo apt update
      - run: sudo apt install -y curl gnupg ca-certificates
      - run: |
          curl -fsSL -o /tmp/pandoc.deb "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          sudo apt install -y /tmp/pandoc.deb
      - run: sudo apt install -y texlive-xetex texlive-fonts-recommended texlive-plain-generic texlive-latex-extra fonts-inter fonts-jetbrains-mono
      - run: curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg > /dev/null
      - run: echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
      - run: sudo apt update
      - run: sudo apt install -y google-chrome-stable
      - run: npm ci --prefix tools/mermaid
      - run: npm ci --prefix tools/mathjax
      - run: pip install -r requirements.txt -r testrequirements.txt
      - run: python sync_repo_icon.py
      - run: python build_pdf.py
      - run: zensical build --clean
      - run: python test/run_tests.py

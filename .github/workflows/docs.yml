name: Documentation
on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      # Only needed so build_pdf.py can pre-render ```mermaid fenced code
      # blocks to static images via mermaid-cli/Puppeteer, and TeX math
      # ($...$/$$...$$) to static images via mathjax-full (pure Node, no
      # browser needed for that one) - WeasyPrint has no JS engine to run
      # Mermaid.js/MathJax client-side like the live Zensical site does. Using
      # the apt-installed Google Chrome below instead of Puppeteer's own
      # bundled download avoids guessing at headless-Chrome shared-library
      # package names.
      PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome-stable
      # Ubuntu's own "pandoc" apt package lags several major versions behind
      # upstream (3.1.3 on 24.04 at time of writing) - old enough that some
      # markdown edge cases (e.g. pymdownx.caret's "^^insert^^" syntax) parse
      # differently than on a contributor's own dev machine, which is exactly
      # what test/test_zensical_basics.py's leak-detection tests check
      # against. Installing a specific upstream .deb release below instead of
      # "apt install pandoc" keeps CI and local dev on the same version,
      # rather than silently drifting whenever Ubuntu's own package updates.
      PANDOC_VERSION: "3.10"
    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: sudo apt update
      - run: sudo apt install -y curl gnupg ca-certificates
      - run: |
          curl -fsSL -o /tmp/pandoc.deb "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
          sudo apt install -y /tmp/pandoc.deb
      # fonts-inter/fonts-jetbrains-mono: this template's default fonts (see
      # "Fonts" in customise.md) - the website loads them from Google Fonts
      # at view time, but WeasyPrint has no such fallback for the PDF; it
      # needs the font files actually installed to embed them, and silently
      # substitutes a generic system font instead of erroring if they're
      # missing (see test_customisation.py's font-embedding check).
      - run: sudo apt install -y texlive-xetex texlive-fonts-recommended texlive-plain-generic texlive-latex-extra fonts-inter fonts-jetbrains-mono
      - run: curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg > /dev/null
      - run: echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
      - run: sudo apt update
      - run: sudo apt install -y google-chrome-stable
      - run: npm ci --prefix tools/mermaid
      - run: npm ci --prefix tools/mathjax
      - run: pip install -r requirements.txt -r testrequirements.txt
      - run: python sync_repo_icon.py
      - run: python build_pdf.py
      - run: zensical build --clean
      - run: python test/run_tests.py
      - uses: actions/upload-pages-artifact@v4
        with:
          path: public
      - uses: actions/deploy-pages@v4
        id: deployment

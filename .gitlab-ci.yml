pages:
  stage: deploy
  image: python:latest
  tags:
    - pages
  script:
    - pip install -r requirements.txt
    - zensical build --clean 
  pages:
    publish: public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
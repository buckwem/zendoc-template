name: Bug report
description: Report a problem with the template, build tooling, or generated output
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug, including any error messages.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this? Include commands run and any relevant config.
      placeholder: |
        1. Run `zensical serve` / `python build_pdf.py`
        2. ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and whether this happens on the website build, the PDF build, or both.
      placeholder: e.g. macOS 15, Python 3.12, PDF build only
    validations:
      required: false
